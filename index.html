<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Viewer</title>

    <style>
        body {
            margin: 0;
            background: #ffffff; /* Changed from light gray to pure white */
            font-family: Arial, sans-serif;
        }
        .container {
            width: 95%;
            max-width: 850px;
            margin: 20px auto;
        }
        object, iframe {
            width: 100%;
            height: 70vh; /* Gives the PDF plenty of room while keeping the layout clean */
            border: none;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .download {
            display: block;
            width: 180px;
            margin: 50px auto 20px auto; /* Increased top margin to 50px to push the button down */
            text-align: center;
            background: #7a1b87;
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
        }
        .download:hover {
            background: #64146f;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Native Embed with fallback link for mobile browsers -->
    <object data="Receipt.pdf" type="application/pdf" width="100%" height="100%">
        <iframe src="Receipt.pdf" width="100%" height="100%" style="border:none;">
            <p>Your browser does not support viewing PDFs inline. Please use the download button below.</p>
        </iframe>
    </object>

    <!-- Direct download link with extra spacing above it -->
    <a class="download" href="Receipt.pdf" download="Receipt.pdf">Download File</a>
</div>

</body>
</html>
